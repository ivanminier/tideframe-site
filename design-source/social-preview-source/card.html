<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    background: radial-gradient(1100px 700px at -5% -10%, #1a3a5c 0%, transparent 55%),
                radial-gradient(900px 600px at 110% 115%, #1f4a3f 0%, transparent 50%),
                linear-gradient(135deg, #0c1f36 0%, #0a1830 60%, #081426 100%);
    position: relative;
    /* Quick Look renders HTML thumbnails in a square canvas; this offset keeps the 1200×630 card centered for export. */
    transform: translateY(228px) scale(.8);
    transform-origin: top left;
  }
  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
  }
  .glow--pacific { width: 480px; height: 480px; top: -160px; left: -120px; background: rgba(50, 125, 168, 0.55); }
  .glow--coral { width: 420px; height: 420px; bottom: -180px; right: -80px; background: rgba(232, 121, 79, 0.32); }

  .frame {
    position: relative;
    width: 1200px;
    height: 630px;
    padding: 64px 72px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .brand-row { display: flex; align-items: center; gap: 14px; }
  .brand-mark { width: 40px; height: 40px; }
  .brand-name {
    color: #eef4f2;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .main {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 56px;
  }

  .copy { max-width: 620px; }
  .eyebrow {
    color: #8fd0c4;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  h1 {
    color: #ffffff;
    font-size: 54px;
    font-weight: 680;
    line-height: 1.08;
    letter-spacing: -0.02em;
    margin-bottom: 22px;
  }
  .sub {
    color: #b9c8d4;
    font-size: 23px;
    line-height: 1.45;
    font-weight: 440;
  }
  .sub strong { color: #f3f6f5; font-weight: 620; }

  .product-panel {
    flex: 0 0 auto;
    width: 300px;
    height: 300px;
    border-radius: 40px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.14);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    backdrop-filter: blur(6px);
  }
  .product-panel img { width: 168px; height: 168px; border-radius: 38px; box-shadow: 0 24px 50px rgba(0,0,0,0.45); }
  .product-name { color: #ffffff; font-size: 22px; font-weight: 650; }
  .product-tag { color: #9fb3c0; font-size: 15px; }

  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .domain { color: #7d92a1; font-size: 16px; font-weight: 560; letter-spacing: 0.01em; }
  .status-chip {
    display: inline-flex;
    align-items: center;
    padding: 7px 16px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    color: #d8e2e6;
    font-size: 14px;
    font-weight: 600;
  }
</style>
</head>
<body>
  <span class="glow glow--pacific"></span>
  <span class="glow glow--coral"></span>
  <div class="frame">
    <div class="brand-row">

      </svg>
      <span class="brand-name">Tideframe Labs</span>
    </div>

    <div class="main">
      <div class="copy">
        <p class="eyebrow">Independent Mac software from Vermont</p>
        <h1>Thoughtful tools for a Mac that works your way.</h1>
        <p class="sub">Focused, private Mac apps for better digital spaces.</p>
      </div>
      <div class="product-panel">
        <img src="../../public/tideframe-icon-glossy.png" alt="">
        <div class="product-name">Tideframe Labs</div>
        <div class="product-tag">Thoughtful Mac software</div>
      </div>
    </div>

    <div class="footer-row">
      <span class="domain">tideframelabs.com</span>
      <span class="status-chip">Modeboard coming soon</span>
    </div>
  </div>
</body>
</html>
